<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" role="img" aria-label="UE channel types and ownership">
  <rect width="720" height="400" fill="#131313" rx="8"/>
  <text x="360" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#f2ca50">Channel Ownership (Top-Down)</text>

  <rect x="240" y="52" width="240" height="44" rx="6" fill="rgba(151,176,255,0.12)" stroke="#97b0ff" stroke-width="1.5"/>
  <text x="360" y="80" text-anchor="middle" font-family="monospace" font-size="13" fill="#e5e2e1">UNetDriver</text>

  <line x1="360" y1="96" x2="360" y2="112" stroke="#99907c" stroke-width="1.5"/>
  <rect x="220" y="112" width="280" height="44" rx="6" fill="rgba(242,202,80,0.1)" stroke="#f2ca50" stroke-width="1.5"/>
  <text x="360" y="140" text-anchor="middle" font-family="monospace" font-size="13" fill="#e5e2e1">UNetConnection (per client)</text>

  <line x1="360" y1="156" x2="360" y2="172" stroke="#99907c" stroke-width="1.5"/>
  <text x="360" y="188" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#d0c5af">owns channel list - decides what data goes on which channel</text>

  <rect x="60" y="204" width="180" height="72" rx="6" fill="rgba(242,202,80,0.14)" stroke="#f2ca50" stroke-width="1.5"/>
  <text x="150" y="232" text-anchor="middle" font-family="monospace" font-size="12" fill="#f2ca50">UControlChannel</text>
  <text x="150" y="252" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#d0c5af">login, map, level load</text>

  <rect x="270" y="204" width="180" height="72" rx="6" fill="rgba(242,202,80,0.14)" stroke="#f2ca50" stroke-width="1.5"/>
  <text x="360" y="232" text-anchor="middle" font-family="monospace" font-size="12" fill="#f2ca50">UActorChannel</text>
  <text x="360" y="252" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#d0c5af">one per replicated actor</text>

  <rect x="480" y="204" width="180" height="72" rx="6" fill="rgba(242,202,80,0.14)" stroke="#f2ca50" stroke-width="1.5"/>
  <text x="570" y="232" text-anchor="middle" font-family="monospace" font-size="12" fill="#f2ca50">UVoiceChannel</text>
  <text x="570" y="252" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#d0c5af">VoIP audio</text>

  <line x1="360" y1="176" x2="150" y2="204" stroke="#4d4635"/>
  <line x1="360" y1="176" x2="360" y2="204" stroke="#4d4635"/>
  <line x1="360" y1="176" x2="570" y2="204" stroke="#4d4635"/>

  <rect x="100" y="300" width="520" height="76" rx="6" fill="rgba(208,197,175,0.06)" stroke="#4d4635"/>
  <text x="360" y="326" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#e5e2e1">Channel owns the scope of data it carries (top-down)</text>
  <text x="360" y="348" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#d0c5af">Data does not pick a channel - UNetDriver / UNetConnection route by channel index</text>
  <text x="360" y="368" text-anchor="middle" font-family="monospace" font-size="11" fill="#d0c5af">extends UChannel - custom channels possible</text>
</svg>
