<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 340" role="img" aria-label="TCP IP stack with UDP at transport layer">
  <rect width="480" height="340" fill="#131313" rx="8"/>
  <text x="240" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#f2ca50">TCP/IP Protocol Stack</text>
  <rect x="100" y="52" width="280" height="44" rx="4" fill="rgba(208,197,175,0.06)" stroke="#4d4635" stroke-width="1.5"/>
  <text x="240" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#e5e2e1">Application Layer</text>
  <text x="240" y="88" text-anchor="middle" font-family="monospace" font-size="11" fill="#d0c5af">DNS, DHCP, SNMP, RTP</text>
  <rect x="100" y="104" width="280" height="52" rx="4" fill="rgba(242,202,80,0.18)" stroke="#f2ca50" stroke-width="2.5"/>
  <text x="240" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f2ca50">Transport Layer (L4)</text>
  <text x="240" y="146" text-anchor="middle" font-family="monospace" font-size="12" fill="#f2ca50">UDP / TCP</text>
  <rect x="100" y="164" width="280" height="44" rx="4" fill="rgba(151,176,255,0.1)" stroke="#4d4635" stroke-width="1.5"/>
  <text x="240" y="184" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#e5e2e1">Internet Layer (L3)</text>
  <text x="240" y="200" text-anchor="middle" font-family="monospace" font-size="11" fill="#d0c5af">IP (Protocol ID 17 = UDP)</text>
  <rect x="100" y="216" width="280" height="44" rx="4" fill="rgba(208,197,175,0.06)" stroke="#4d4635" stroke-width="1.5"/>
  <text x="240" y="236" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#e5e2e1">Network Access Layer</text>
  <text x="240" y="252" text-anchor="middle" font-family="monospace" font-size="11" fill="#d0c5af">Ethernet, Wi-Fi</text>
  <path d="M240 96 L240 104" stroke="#99907c" stroke-width="1.2"/>
  <path d="M240 156 L240 164" stroke="#f2ca50" stroke-width="1.5"/>
  <path d="M240 208 L240 216" stroke="#99907c" stroke-width="1.2"/>
  <text x="240" y="296" text-anchor="middle" font-family="monospace" font-size="11" fill="#d0c5af">UDP: datagram mode over IP</text>
  <text x="240" y="318" text-anchor="middle" font-family="monospace" font-size="11" fill="#d0c5af">No virtual circuit</text>
</svg>
