<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" role="img" aria-label="UDP maximum payload calculation">
  <rect width="640" height="260" fill="#131313" rx="8"/>
  <text x="320" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#f2ca50">Maximum UDP Payload (IPv4)</text>
  <rect x="40" y="68" width="130" height="72" rx="6" fill="rgba(208,197,175,0.08)" stroke="#99907c" stroke-width="1.5"/>
  <text x="105" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#e5e2e1">UDP Length</text>
  <text x="105" y="118" text-anchor="middle" font-family="monospace" font-size="14" fill="#f2ca50">65,535 B</text>
  <text x="105" y="134" text-anchor="middle" font-family="monospace" font-size="11" fill="#d0c5af">2^16 - 1</text>
  <text x="188" y="110" font-family="monospace" font-size="20" fill="#99907c">-</text>
  <rect x="210" y="68" width="110" height="72" rx="6" fill="rgba(242,202,80,0.12)" stroke="#f2ca50" stroke-width="1.5"/>
  <text x="265" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#e5e2e1">UDP Hdr</text>
  <text x="265" y="122" text-anchor="middle" font-family="monospace" font-size="14" fill="#f2ca50">8 B</text>
  <text x="338" y="110" font-family="monospace" font-size="20" fill="#99907c">-</text>
  <rect x="360" y="68" width="110" height="72" rx="6" fill="rgba(151,176,255,0.12)" stroke="#97b0ff" stroke-width="1.5"/>
  <text x="415" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#e5e2e1">IP Hdr</text>
  <text x="415" y="122" text-anchor="middle" font-family="monospace" font-size="14" fill="#97b0ff">20 B</text>
  <text x="488" y="110" font-family="monospace" font-size="20" fill="#f2ca50">=</text>
  <rect x="510" y="68" width="90" height="72" rx="6" fill="rgba(242,202,80,0.2)" stroke="#f2ca50" stroke-width="2"/>
  <text x="555" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#e5e2e1">Payload</text>
  <text x="555" y="122" text-anchor="middle" font-family="monospace" font-size="14" fill="#f2ca50">65,507 B</text>
  <rect x="80" y="168" width="480" height="64" rx="6" fill="rgba(242,202,80,0.06)" stroke="#4d4635"/>
  <text x="320" y="196" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#e5e2e1">Application data per datagram</text>
  <text x="320" y="218" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#d0c5af">IPv4, 20-byte IP header, no IP options</text>
</svg>
