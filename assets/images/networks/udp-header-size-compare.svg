<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" role="img" aria-label="UDP vs TCP header size">
  <rect width="640" height="220" fill="#131313" rx="8"/>
  <text x="320" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#f2ca50">Transport Header Size</text>
  <text x="48" y="78" font-family="system-ui,sans-serif" font-size="14" fill="#e5e2e1">UDP</text>
  <rect x="120" y="60" width="80" height="28" rx="4" fill="rgba(242,202,80,0.25)" stroke="#f2ca50" stroke-width="1.5"/>
  <text x="210" y="80" font-family="monospace" font-size="13" fill="#f2ca50">8 B</text>
  <text x="260" y="80" font-family="system-ui,sans-serif" font-size="12" fill="#d0c5af">fixed</text>
  <text x="48" y="138" font-family="system-ui,sans-serif" font-size="14" fill="#e5e2e1">TCP</text>
  <rect x="120" y="120" width="200" height="28" rx="4" fill="rgba(151,176,255,0.15)" stroke="#97b0ff" stroke-width="1.5"/>
  <text x="330" y="138" font-family="monospace" font-size="13" fill="#97b0ff">20 B</text>
  <text x="380" y="138" font-family="system-ui,sans-serif" font-size="12" fill="#d0c5af">minimum (no options)</text>
  <line x1="120" y1="168" x2="520" y2="168" stroke="#4d4635"/>
  <text x="120" y="188" font-family="monospace" font-size="11" fill="#d0c5af">0</text>
  <text x="200" y="188" font-family="monospace" font-size="11" fill="#d0c5af">8 B</text>
  <text x="320" y="188" font-family="monospace" font-size="11" fill="#d0c5af">20 B</text>
  <text x="320" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#d0c5af">UDP - minimal header processing overhead</text>
</svg>
