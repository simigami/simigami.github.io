<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" role="img" aria-label="UDP vs TCP feature comparison">
  <rect width="640" height="320" fill="#131313" rx="8"/>
  <text x="320" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#f2ca50">UDP vs TCP</text>
  <rect x="40" y="52" width="560" height="260" fill="none" stroke="#4d4635" stroke-width="1"/>
  <rect x="40" y="52" width="560" height="36" fill="rgba(242,202,80,0.1)" stroke="#4d4635" stroke-width="1"/>
  <line x1="280" y1="52" x2="280" y2="312" stroke="#4d4635"/>
  <line x1="440" y1="52" x2="440" y2="312" stroke="#4d4635"/>
  <text x="160" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#f2ca50">Feature</text>
  <text x="360" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#f2ca50">UDP</text>
  <text x="520" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#f2ca50">TCP</text>
  <line x1="40" y1="88" x2="600" y2="88" stroke="#4d4635"/>
  <text x="60" y="112" font-family="system-ui,sans-serif" font-size="13" fill="#d0c5af">ACK</text>
  <text x="360" y="112" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#ffb4ab">No</text>
  <text x="520" y="112" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#97b0ff">Yes</text>
  <line x1="40" y1="124" x2="600" y2="124" stroke="#4d4635"/>
  <text x="60" y="148" font-family="system-ui,sans-serif" font-size="13" fill="#d0c5af">Ordering</text>
  <text x="360" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#ffb4ab">No</text>
  <text x="520" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#97b0ff">Yes</text>
  <line x1="40" y1="160" x2="600" y2="160" stroke="#4d4635"/>
  <text x="60" y="184" font-family="system-ui,sans-serif" font-size="13" fill="#d0c5af">Flow control</text>
  <text x="360" y="184" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#ffb4ab">No</text>
  <text x="520" y="184" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#97b0ff">Yes</text>
  <line x1="40" y1="196" x2="600" y2="196" stroke="#4d4635"/>
  <text x="60" y="220" font-family="system-ui,sans-serif" font-size="13" fill="#d0c5af">Error control</text>
  <text x="360" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#e5e2e1">Checksum</text>
  <text x="520" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#97b0ff">Full</text>
  <line x1="40" y1="232" x2="600" y2="232" stroke="#4d4635"/>
  <text x="60" y="256" font-family="system-ui,sans-serif" font-size="13" fill="#d0c5af">Connection</text>
  <text x="360" y="256" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#e5e2e1">Connectionless</text>
  <text x="520" y="256" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#97b0ff">Virtual circuit</text>
  <line x1="40" y1="268" x2="600" y2="268" stroke="#4d4635"/>
  <text x="60" y="300" font-family="system-ui,sans-serif" font-size="13" fill="#d0c5af">Unit</text>
  <text x="360" y="300" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#e5e2e1">Message</text>
  <text x="520" y="300" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#e5e2e1">Segment</text>
</svg>
