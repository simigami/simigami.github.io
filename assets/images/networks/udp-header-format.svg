<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-label="UDP header bit fields RFC 768">
  <rect width="720" height="300" fill="#131313" rx="8"/>
  <text x="360" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#f2ca50">User Datagram Header Format</text>
  <text x="100" y="58" text-anchor="middle" font-family="monospace" font-size="11" fill="#99907c">0</text>
  <text x="180" y="58" text-anchor="middle" font-family="monospace" font-size="11" fill="#99907c">7</text>
  <text x="260" y="58" text-anchor="middle" font-family="monospace" font-size="11" fill="#99907c">8</text>
  <text x="340" y="58" text-anchor="middle" font-family="monospace" font-size="11" fill="#99907c">15</text>
  <text x="420" y="58" text-anchor="middle" font-family="monospace" font-size="11" fill="#99907c">16</text>
  <text x="500" y="58" text-anchor="middle" font-family="monospace" font-size="11" fill="#99907c">23</text>
  <text x="580" y="58" text-anchor="middle" font-family="monospace" font-size="11" fill="#99907c">24</text>
  <text x="660" y="58" text-anchor="middle" font-family="monospace" font-size="11" fill="#99907c">31</text>
  <rect x="60" y="68" width="300" height="52" fill="rgba(242,202,80,0.1)" stroke="#4d4635" stroke-width="1.5"/>
  <rect x="360" y="68" width="300" height="52" fill="rgba(242,202,80,0.1)" stroke="#4d4635" stroke-width="1.5"/>
  <line x1="360" y1="68" x2="360" y2="120" stroke="#4d4635"/>
  <text x="210" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#e5e2e1">Source Port</text>
  <text x="210" y="110" text-anchor="middle" font-family="monospace" font-size="10" fill="#d0c5af">16 bits</text>
  <text x="510" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#e5e2e1">Destination Port</text>
  <text x="510" y="110" text-anchor="middle" font-family="monospace" font-size="10" fill="#d0c5af">16 bits</text>
  <rect x="60" y="128" width="300" height="52" fill="rgba(242,202,80,0.1)" stroke="#4d4635" stroke-width="1.5"/>
  <rect x="360" y="128" width="300" height="52" fill="rgba(242,202,80,0.1)" stroke="#4d4635" stroke-width="1.5"/>
  <line x1="360" y1="128" x2="360" y2="180" stroke="#4d4635"/>
  <text x="210" y="152" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#e5e2e1">Length</text>
  <text x="210" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#d0c5af">16 bits</text>
  <text x="510" y="152" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#e5e2e1">Checksum</text>
  <text x="510" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#d0c5af">16 bits (optional)</text>
  <rect x="60" y="188" width="600" height="52" fill="rgba(208,197,175,0.06)" stroke="#4d4635" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="360" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#d0c5af">data octets ...</text>
  <text x="360" y="268" text-anchor="middle" font-family="monospace" font-size="11" fill="#d0c5af">Fixed header = 8 bytes</text>
</svg>
