<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-label="UDP pseudo header for checksum">
  <rect width="720" height="280" fill="#131313" rx="8"/>
  <text x="360" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#f2ca50">Pseudo Header (for Checksum)</text>
  <rect x="60" y="68" width="600" height="44" fill="rgba(151,176,255,0.1)" stroke="#4d4635" stroke-width="1.5"/>
  <text x="360" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#e5e2e1">Source Address (32 bits)</text>
  <rect x="60" y="118" width="600" height="44" fill="rgba(151,176,255,0.1)" stroke="#4d4635" stroke-width="1.5"/>
  <text x="360" y="146" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#e5e2e1">Destination Address (32 bits)</text>
  <rect x="60" y="168" width="200" height="44" fill="rgba(151,176,255,0.1)" stroke="#4d4635" stroke-width="1.5"/>
  <rect x="260" y="168" width="200" height="44" fill="rgba(151,176,255,0.1)" stroke="#4d4635" stroke-width="1.5"/>
  <rect x="460" y="168" width="200" height="44" fill="rgba(151,176,255,0.1)" stroke="#4d4635" stroke-width="1.5"/>
  <line x1="260" y1="168" x2="260" y2="212" stroke="#4d4635"/>
  <line x1="460" y1="168" x2="460" y2="212" stroke="#4d4635"/>
  <text x="160" y="196" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#e5e2e1">Zero</text>
  <text x="360" y="196" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#e5e2e1">Protocol</text>
  <text x="560" y="196" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#e5e2e1">UDP Length</text>
  <text x="160" y="208" text-anchor="middle" font-family="monospace" font-size="10" fill="#d0c5af">8 bits</text>
  <text x="360" y="208" text-anchor="middle" font-family="monospace" font-size="10" fill="#d0c5af">8 bits (= 17)</text>
  <text x="560" y="208" text-anchor="middle" font-family="monospace" font-size="10" fill="#d0c5af">16 bits</text>
  <text x="360" y="248" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#d0c5af">Prefixed to UDP header + data for one's complement checksum (RFC 768)</text>
</svg>
